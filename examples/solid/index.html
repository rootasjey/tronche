<!doctype html>
<html lang="en">
  <head>

    <title>Tronche × Solid</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: Inter, system-ui, sans-serif; background: #0f0f11; color: #e4e4e7; display: flex; justify-content: center; padding: 4rem 1rem; }

      p { color: #a1a1aa; margin-bottom: 2rem; }

      .card { display: flex; flex-direction: column; align-items: center; gap: .5rem; }
      .card span { font-size: .75rem; color: #a1a1aa; }
    </style>

      <h1>tronche × Solid</h1>
