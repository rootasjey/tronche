<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tronche Lit Example</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: system-ui, sans-serif; background: #1a1a2e; color: #e0e0e0; display: flex; justify-content: center; padding: 2rem; }
      main { max-width: 800px; width: 100%; }
      h1 { text-align: center; margin-bottom: 2rem; font-size: 2rem; }
      section { margin-bottom: 3rem; }
      section h2 { font-size: 1rem; color: #888; margin-bottom: 1rem; text-align: center; text-transform: uppercase; letter-spacing: 0.1em; }

      .controls { display: flex; gap: 1rem; justify-content: center; margin-bottom: 1.5rem; flex-wrap: wrap; align-items: center; }
      .controls label { display: flex; align-items: center; gap: 0.5rem; font-size: 0.9rem; cursor: pointer; }
      .controls input, .controls select { padding: 0.4rem 0.6rem; border-radius: 6px; border: 1px solid #444; background: #16213e; color: #e0e0e0; font-size: 0.9rem; }
      .controls input[type="checkbox"] { width: 1rem; height: 1rem; cursor: pointer; }
      .controls button { padding: 0.4rem 1rem; border-radius: 6px; border: none; background: #0f3460; color: #e0e0e0; cursor: pointer; font-size: 0.9rem; }
      .controls button:hover { background: #1a4a8a; }

      .preview { display: flex; justify-content: center; margin-bottom: 1rem; }
      .preview .card { text-align: center; }
      .preview .card p { margin-top: 0.5rem; font-size: 0.85rem; color: #aaa; }

      .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 1.5rem; justify-items: center; }
      .grid .card { text-align: center; }
      .grid .card p { margin-top: 0.5rem; font-size: 0.8rem; color: #888; }
    </style>
  </head>
  <body>
    <main>
      <h1>Tronche · Lit</h1>

      <section>
        <h2>Preview</h2>
        <div class="preview">
          <div class="card">
            <tronche-avatar id="avatar" variant="marble" name="Clara Barton" size="160"></tronche-avatar>
            <p id="preview-label">marble · Clara Barton</p>
          </div>
        </div>
        <div class="controls">
          <label>Name <input id="name" type="text" value="Clara Barton" /></label>
          <label>Variant <select id="variant">
            <option value="marble">Marble</option>
            <option value="beam">Beam</option>
            <option value="bauhaus">Bauhaus</option>
            <option value="pixel">Pixel</option>
            <option value="ring">Ring</option>
            <option value="sunset">Sunset</option>
          </select></label>
          <label><input id="square" type="checkbox" /> Square</label>
          <label>Size <input id="size" type="number" value="160" min="20" max="300" /></label>
          <button id="randomize-name">Random name</button>
          <button id="randomize-colors">Random colors</button>
        </div>
        <div id="palette" style="display:flex;gap:4px;justify-content:center;margin-top:0.5rem"></div>
      </section>

      <section>
        <h2>All variants</h2>
        <div class="grid">
          <div class="card">
            <tronche-marble name="Alice" size="100"></tronche-marble>
            <p>marble</p>
          </div>
          <div class="card">
            <tronche-beam name="Bob" size="100"></tronche-beam>
            <p>beam</p>
          </div>
          <div class="card">
            <tronche-bauhaus name="Charlie" size="100"></tronche-bauhaus>
            <p>bauhaus</p>
          </div>
          <div class="card">
            <tronche-pixel name="Diana" size="100"></tronche-pixel>
            <p>pixel</p>
          </div>
          <div class="card">
            <tronche-ring name="Eve" size="100"></tronche-ring>
            <p>ring</p>
          </div>
          <div class="card">
            <tronche-sunset name="Frank" size="100"></tronche-sunset>
            <p>sunset</p>
          </div>
        </div>
      </section>
    </main>

    <script type="module">
      import 'tronche/lit'

      const avatar = document.getElementById('avatar')
      const previewLabel = document.getElementById('preview-label')
      const nameInput = document.getElementById('name')
      const variantSelect = document.getElementById('variant')
      const squareCheck = document.getElementById('square')
      const sizeInput = document.getElementById('size')
      const randomNameBtn = document.getElementById('randomize-name')
      const randomColorsBtn = document.getElementById('randomize-colors')
      const paletteEl = document.getElementById('palette')

      const names = ['Ada Lovelace', 'Grace Hopper', 'Alan Turing', 'Margaret Hamilton', 'Linus Torvalds', 'Guido van Rossum', 'Dennis Ritchie', 'Ken Thompson', 'Barbara Liskov', 'Brendan Eich', 'John McCarthy', 'Donald Knuth']

      function randomPalette() {
        const colors = []
        for (let i = 0; i < 5; i++) {
          const h = Math.floor(Math.random() * 360)
          const s = 40 + Math.floor(Math.random() * 40)
          const l = 30 + Math.floor(Math.random() * 40)
          colors.push(`hsl(${h},${s}%,${l}%)`)
        }
        return colors
      }

      function showPalette(colors) {
        paletteEl.innerHTML = colors.map(c =>
          `<span style="display:inline-block;width:1.2rem;height:1.2rem;border-radius:4px;background:${c};border:1px solid #555"></span>`
        ).join('')
      }

      function update() {
        avatar.variant = variantSelect.value
        avatar.name = nameInput.value
        avatar.square = squareCheck.checked
        avatar.size = Number(sizeInput.value)
        previewLabel.textContent = `${variantSelect.value} · ${nameInput.value}`
      }

      function applyColors(colors) {
        avatar.colors = colors
        for (const el of document.querySelectorAll('tronche-marble, tronche-beam, tronche-bauhaus, tronche-pixel, tronche-ring, tronche-sunset')) {
          el.colors = colors
        }
        showPalette(colors)
      }

      nameInput.addEventListener('input', update)
      variantSelect.addEventListener('change', update)
      squareCheck.addEventListener('change', update)
      sizeInput.addEventListener('input', update)
      randomNameBtn.addEventListener('click', () => {
        nameInput.value = names[Math.floor(Math.random() * names.length)]
        update()
      })
      randomColorsBtn.addEventListener('click', () => {
        applyColors(randomPalette())
      })

      const defaultColors = ['#E07A5F', '#3D405B', '#81B29A', '#F4D06F', '#D8A47F']
      showPalette(defaultColors)

      update()
    </script>
  </body>
</html>
