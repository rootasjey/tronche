<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tronche × Svelte</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg: #ffffff;
        --text: #18181b;
        --muted: #71717a;
        --btn-bg: #f4f4f5;
        --card-bg: #ffffff;
        --border: #e4e4e7;
        --accent-bg: #e0e0e0;
      }
      [data-theme="dark"] {
        --bg: #0f0f11;
        --text: #e4e4e7;
        --muted: #a1a1aa;
        --btn-bg: #27272a;
        --card-bg: #18181b;
        --border: #3f3f46;
        --accent-bg: #3f3f46;
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { font-family: Inter, system-ui, sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; padding: 4rem 1rem; }
      main { max-width: 720px; width: 100%; }
      h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: .25rem; }
      p { color: var(--muted); margin-bottom: 2rem; }
      code { background: var(--btn-bg); padding: .125rem .375rem; border-radius: .25rem; font-size: .875rem; }
    </style>
  </head>
  <body>
    <main>
      <h1>tronche × Svelte</h1>
      <p>Avatars rendered with <code>tronche/svelte</code></p>
      <div id="app"></div>
    </main>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
