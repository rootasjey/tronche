<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tronche — Avatars nothing like you</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,400;1,9..144,600&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

  :root {
    --bg: #0c0c0e;
    --surface: #16161a;
    --surface-2: #1c1c21;
    --border: #2a2a30;
    --text: #ececef;
    --text-muted: #7a7a8a;
    --accent: #F05D5E;
    --accent-soft: rgba(240, 93, 94, 0.12);
    --radius: 16px;
  }

  body {
    font-family: 'DM Sans', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9999;
  }

  .container {
    max-width: 1100px;
    margin: 0 auto;
    padding: 60px 40px 80px;
  }

  .header {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 64px;
  }

  .logo-icon {
    width: 24px;
    height: 24px;
    flex-shrink: 0;
  }

  .logo-icon svg {
    width: 100%;
    height: 100%;
    display: block;
  }

  .logo-text {
    font-family: 'Fraunces', serif;
    font-size: 26px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }

  .logo-text span {
    color: var(--accent);
  }

  .hero {
    text-align: center;
    margin-bottom: 72px;
    margin-top: 72px;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--accent-soft);
    font-size: 13px;
    font-weight: 600;
    padding: 6px 14px;
    border-radius: 100px;
    margin-bottom: 24px;
    letter-spacing: 0.3px;
  }

  h1 {
    font-family: 'Fraunces', serif;
    font-size: clamp(40px, 5.5vw, 64px);
    font-weight: 700;
    line-height: 1.1;
    letter-spacing: -1.5px;
    margin-bottom: 20px;
  }

  h1 em {
    font-style: italic;
    color: var(--accent);
  }

  .subtitle {
    font-size: 18px;
    color: var(--text-muted);
    max-width: 520px;
    margin: 0 auto 40px;
    line-height: 1.6;
  }

  .subtitle strong {
    color: var(--text);
    font-weight: 600;
  }

  .code-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    margin-bottom: 72px;
    max-width: 640px;
    margin: 0 auto;
  }

  .avatars-row {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-bottom: 72px;
    flex-wrap: wrap;
  }

  .avatar-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }

  .avatar-bubble {
    width: 72px;
    height: 72px;
    border-radius: 50%;
    overflow: hidden;
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.25);
    transition: transform 0.2s ease;
  }

  .avatar-bubble:hover {
    transform: scale(1.1);
  }

  .avatar-bubble svg {
    width: 100%;
    height: 100%;
    display: block;
  }

  .avatar-label {
    font-size: 13px;
    color: var(--text-muted);
    font-weight: 500;
  }

  .code-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    background: var(--surface-2);
  }

  .code-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
  }

  .code-dot:nth-child(1) { background: #ff5f57; }
  .code-dot:nth-child(2) { background: #febc2e; }
  .code-dot:nth-child(3) { background: #28c840; }

  .code-tab {
    margin-left: 12px;
    font-size: 12px;
    color: var(--text-muted);
    font-weight: 500;
  }

  .code-body {
    padding: 24px;
    font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
    font-size: 14px;
    line-height: 1.8;
    overflow-x: auto;
  }

  .code-body .comment { color: #5a5a6a; }
  .code-body .tag { color: #f07178; }
  .code-body .attr { color: #ffcb6b; }
  .code-body .string { color: #c3e88d; }

  .glow-1 {
    position: fixed;
    width: 500px;
    height: 500px;
    background: radial-gradient(circle, rgba(240, 93, 94, 0.08) 0%, transparent 70%);
    top: -100px;
    right: -100px;
    pointer-events: none;
  }

  .glow-2 {
    position: fixed;
    width: 400px;
    height: 400px;
    background: radial-gradient(circle, rgba(129, 178, 154, 0.06) 0%, transparent 70%);
    bottom: -50px;
    left: -50px;
    pointer-events: none;
  }
</style>
</head>
<body>

<div class="glow-1"></div>
<div class="glow-2"></div>

<div class="container">
  <div class="hero">
    <div class="badge">
      <div class="logo-icon">
        <svg viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
          <mask id="logo-mask" maskUnits="userSpaceOnUse" x="0" y="0" width="36" height="36">
            <rect width="36" height="36" rx="72" fill="white" />
          </mask>
          <g mask="url(#logo-mask)">
            <rect width="36" height="36" fill="#45B7D1" />
            <rect x="0" y="0" width="36" height="36" transform="translate(8 8) rotate(94 18 18) scale(1.1)" fill="#FFEAA7" rx="6" />
            <g transform="translate(4 4) rotate(-4 18 18)">
              <path d="M13,20 a1,0.75 0 0,0 10,0" fill="#000000" />
              <rect x="10" y="14" width="1.5" height="2" rx="1" fill="#000000" />
              <rect x="24" y="14" width="1.5" height="2" rx="1" fill="#000000" />
            </g>
          </g>
        </svg>
      </div>
      <div class="logo-text">tronche</div>
    </div>
    <h1>Avatars <em>nothing</em> like you.</h1>
    <p class="subtitle">
      Generate unique SVG avatars from a <strong>name</strong> and a <strong>color palette</strong>.
      Available as a Nuxt module, Vue component, or REST API.
    </p>
  </div>

  <div class="avatars-row" id="avatars-row"></div>

  <div class="code-section">
    <div class="code-header">
      <div class="code-dot"></div>
      <div class="code-dot"></div>
      <div class="code-dot"></div>
      <span class="code-tab">app.vue</span>
    </div>
    <div class="code-body">
      <span class="comment">&lt;!-- Nuxt module — components auto-imported --&gt;</span><br>
      <span class="tag">&lt;template&gt;</span><br>
      &nbsp;&nbsp;<span class="tag">&lt;Avatar</span> <span class="attr">name</span>=<span class="string">"Maria Mitchell"</span> <span class="attr">variant</span>=<span class="string">"beam"</span> <span class="tag">/&gt;</span><br>
      <span class="tag">&lt;/template&gt;</span>
    </div>
  </div>
</div>

<script>
const COLORS = ['#E07A5F', '#3D405B', '#81B29A', '#F4D06F', '#D8A47F'];
const SIZE = 80;
const ELEMENTS = 3;

function hashCode(name) {
  let hash = 0;
  for (let i = 0; i < name.length; i++) {
    hash = ((hash << 5) - hash) + name.charCodeAt(i);
    hash = hash & hash;
  }
  return Math.abs(hash);
}

function getDigit(number, ntn) {
  return Math.floor((number / Math.pow(10, ntn)) % 10);
}

function getUnit(number, range, index) {
  const value = number % range;
  if (index && (getDigit(number, index) % 2) === 0) {
    return -value;
  }
  return value;
}

function getRandomColor(number, colors, range) {
  return colors[number % range];
}

function getContrast(hexcolor) {
  if (hexcolor.slice(0, 1) === '#') hexcolor = hexcolor.slice(1);
  const r = parseInt(hexcolor.substring(0, 2), 16);
  const g = parseInt(hexcolor.substring(2, 4), 16);
  const b = parseInt(hexcolor.substring(4, 6), 16);
  const yiq = ((r * 299) + (g * 587) + (b * 114)) / 1000;
  return (yiq >= 128) ? '#000000' : '#FFFFFF';
}

function generateMarbleSVG(name, colors, size) {
  const numFromName = hashCode(name);
  const range = colors.length;

  const props = Array.from({ length: ELEMENTS }, (_, i) => ({
    color: getRandomColor(numFromName + i, colors, range),
    translateX: getUnit(numFromName * (i + 1), size / 10, 1),
    translateY: getUnit(numFromName * (i + 1), size / 10, 2),
    scale: 1.2 + getUnit(numFromName * (i + 1), size / 20) / 10,
    rotate: getUnit(numFromName * (i + 1), 360, 1),
  }));

  const maskID = `m-${numFromName}`;

  return `<svg viewBox="0 0 ${size} ${size}" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <filter id="f-${maskID}" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
        <feFlood flood-opacity="0" result="BackgroundImageFix"/>
        <feBlend in="SourceGraphic" in2="BackgroundImageFix" result="shape"/>
        <feGaussianBlur stdDeviation="7" result="effect1_foregroundBlur"/>
      </filter>
    </defs>
    <mask id="${maskID}" maskUnits="userSpaceOnUse" x="0" y="0" width="${size}" height="${size}">
      <rect width="${size}" height="${size}" rx="${size * 2}" fill="#FFFFFF"/>
    </mask>
    <g mask="url(#${maskID})">
      <rect width="${size}" height="${size}" fill="${props[0].color}"/>
      <path
        filter="url(#f-${maskID})"
        d="M32.414 59.35L50.376 70.5H72.5v-71H33.728L26.5 13.381l19.057 27.08L32.414 59.35z"
        fill="${props[1].color}"
        transform="translate(${props[1].translateX} ${props[1].translateY}) rotate(${props[1].rotate} ${size / 2} ${size / 2}) scale(${props[2].scale})"
      />
      <path
        filter="url(#f-${maskID})"
        style="mix-blend-mode: overlay"
        d="M22.216 24L0 46.75l14.108 38.129L78 86l-3.081-59.276-22.378 4.005 12.972 20.186-23.35 27.395L22.215 24z"
        fill="${props[2].color}"
        transform="translate(${props[2].translateX} ${props[2].translateY}) rotate(${props[2].rotate} ${size / 2} ${size / 2}) scale(${props[2].scale})"
      />
    </g>
  </svg>`;
}

function generateBeamSVG(name, colors, size) {
  const numFromName = hashCode(name);
  const bgColor = getRandomColor(numFromName, colors, colors.length);
  const faceColor = getContrast(bgColor);

  const eyeY = 22 + getUnit(numFromName, 3, 1);
  const eyeSize = 2 + (numFromName % 2);
  const mouthY = 30 + getUnit(numFromName, 3, 2);
  const smileWidth = 8 + (numFromName % 5);
  const eyeSpacing = 6 + (numFromName % 3);

  return `<svg viewBox="0 0 ${size} ${size}" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <mask id="bm-${numFromName}" maskUnits="userSpaceOnUse" x="0" y="0" width="${size}" height="${size}">
        <rect width="${size}" height="${size}" rx="${size * 2}" fill="#FFFFFF"/>
      </mask>
    </defs>
    <g mask="url(#bm-${numFromName})">
      <rect width="${size}" height="${size}" fill="${bgColor}"/>
      <circle cx="${size / 2 - eyeSpacing}" cy="${eyeY}" r="${eyeSize}" fill="${faceColor}"/>
      <circle cx="${size / 2 + eyeSpacing}" cy="${eyeY}" r="${eyeSize}" fill="${faceColor}"/>
      <path d="M${size / 2 - smileWidth / 2} ${mouthY} Q${size / 2} ${mouthY + 6} ${size / 2 + smileWidth / 2} ${mouthY}" stroke="${faceColor}" stroke-width="2" fill="none" stroke-linecap="round"/>
    </g>
  </svg>`;
}

function generatePixelSVG(name, colors, size) {
  const numFromName = hashCode(name);
  const cellSize = size / 8;
  let rects = '';
  for (let y = 0; y < 8; y++) {
    for (let x = 0; x < 8; x++) {
      const color = getRandomColor(numFromName + x * 8 + y, colors, colors.length);
      rects += `<rect x="${x * cellSize}" y="${y * cellSize}" width="${cellSize}" height="${cellSize}" fill="${color}"/>`;
    }
  }
  return `<svg viewBox="0 0 ${size} ${size}" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <mask id="px-${numFromName}" maskUnits="userSpaceOnUse" x="0" y="0" width="${size}" height="${size}">
        <rect width="${size}" height="${size}" rx="12" fill="#FFFFFF"/>
      </mask>
    </defs>
    <g mask="url(#px-${numFromName})">
      ${rects}
    </g>
  </svg>`;
}

function generateSunsetSVG(name, colors, size) {
  const numFromName = hashCode(name);
  const c1 = getRandomColor(numFromName, colors, colors.length);
  const c2 = getRandomColor(numFromName + 1, colors, colors.length);
  const c3 = getRandomColor(numFromName + 2, colors, colors.length);
  const c4 = getRandomColor(numFromName + 3, colors, colors.length);

  return `<svg viewBox="0 0 ${size} ${size}" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="sg-${numFromName}" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="${c1}"/>
        <stop offset="100%" stop-color="${c2}"/>
      </linearGradient>
      <linearGradient id="sg2-${numFromName}" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="${c3}"/>
        <stop offset="100%" stop-color="${c4}"/>
      </linearGradient>
      <mask id="su-${numFromName}" maskUnits="userSpaceOnUse" x="0" y="0" width="${size}" height="${size}">
        <rect width="${size}" height="${size}" rx="${size * 2}" fill="#FFFFFF"/>
      </mask>
    </defs>
    <g mask="url(#su-${numFromName})">
      <rect width="${size}" height="${size / 2}" fill="url(#sg-${numFromName})"/>
      <rect y="${size / 2}" width="${size}" height="${size / 2}" fill="url(#sg2-${numFromName})"/>
    </g>
  </svg>`;
}

function generateRingSVG(name, colors, size) {
  const numFromName = hashCode(name);
  const cx = size / 2;
  const cy = size / 2;
  const r = size / 2;

  const c1 = getRandomColor(numFromName, colors, colors.length);
  const c2 = getRandomColor(numFromName + 1, colors, colors.length);
  const c3 = getRandomColor(numFromName + 2, colors, colors.length);
  const c4 = getRandomColor(numFromName + 3, colors, colors.length);
  const c5 = getRandomColor(numFromName + 4, colors, colors.length);

  return `<svg viewBox="0 0 ${size} ${size}" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <mask id="rn-${numFromName}" maskUnits="userSpaceOnUse" x="0" y="0" width="${size}" height="${size}">
        <rect width="${size}" height="${size}" rx="${size * 2}" fill="#FFFFFF"/>
      </mask>
    </defs>
    <g mask="url(#rn-${numFromName})">
      <rect width="${size}" height="${size}" fill="${c1}"/>
      <path d="M0 ${cy + 5} A${r} ${r} 0 0 1 ${size} ${cy + 5} Z" fill="${c2}"/>
      <path d="M0 ${cy} A${r} ${r} 0 0 1 ${size} ${cy} Z" fill="${c3}"/>
      <path d="M0 ${cy - 8} A${r} ${r} 0 0 1 ${size} ${cy - 8} Z" fill="${c4}"/>
      <path d="M0 ${cy + 10} A${r} ${r} 0 0 0 ${size} ${cy + 10} Z" fill="${c5}"/>
      <path d="M0 ${cy + 16} A${r} ${r} 0 0 0 ${size} ${cy + 16} Z" fill="${c1}"/>
      <path d="M0 ${cy + 22} A${r} ${r} 0 0 0 ${size} ${cy + 22} Z" fill="${c2}"/>
      <circle cx="${cx}" cy="${cy}" r="${r * 0.25}" fill="${c3}"/>
    </g>
  </svg>`;
}

function generateBauhausSVG(name, colors, size) {
  const numFromName = hashCode(name);
  const c1 = getRandomColor(numFromName, colors, colors.length);
  const c2 = getRandomColor(numFromName + 1, colors, colors.length);
  const c3 = getRandomColor(numFromName + 2, colors, colors.length);
  const c4 = getRandomColor(numFromName + 3, colors, colors.length);

  const rot = getUnit(numFromName, 30, 1);
  const circleX = size * 0.4 + getUnit(numFromName, size * 0.2, 2);
  const circleY = size * 0.35 + getUnit(numFromName, size * 0.15, 3);
  const circleR = size * 0.2 + (numFromName % (size * 0.1));

  return `<svg viewBox="0 0 ${size} ${size}" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <mask id="bh-${numFromName}" maskUnits="userSpaceOnUse" x="0" y="0" width="${size}" height="${size}">
        <rect width="${size}" height="${size}" rx="${size * 2}" fill="#FFFFFF"/>
      </mask>
    </defs>
    <g mask="url(#bh-${numFromName})">
      <rect width="${size}" height="${size}" fill="${c1}"/>
      <rect x="${size * 0.15}" y="${size * 0.25}" width="${size * 0.7}" height="${size * 0.5}" fill="${c2}" transform="rotate(${rot} ${size / 2} ${size / 2})"/>
      <circle cx="${circleX}" cy="${circleY}" r="${circleR}" fill="${c3}"/>
      <line x1="${size * 0.2}" y1="${size * 0.75}" x2="${size * 0.8}" y2="${size * 0.25}" stroke="${c4}" stroke-width="${size * 0.06}" stroke-linecap="round"/>
    </g>
  </svg>`;
}

const generators = {
  marble: generateMarbleSVG,
  beam: generateBeamSVG,
  pixel: generatePixelSVG,
  sunset: generateSunsetSVG,
  ring: generateRingSVG,
  bauhaus: generateBauhausSVG,
};

const variantDescriptions = {
  marble: 'Soft blurred shapes',
  beam: 'Expressive faces',
  pixel: '8\u00d78 pixel art',
  sunset: 'Color gradients',
  ring: 'Concentric circles',
  bauhaus: 'Geometric shapes',
};

const variantNames = ['marble', 'beam', 'pixel', 'sunset', 'ring', 'bauhaus'];
const variantLabels = ['Marble', 'Beam', 'Pixel', 'Sunset', 'Ring', 'Bauhaus'];
const variantColors = {
  marble: ['#5b1d99', '#0074b4', '#00b34c', '#ffd41f', '#fc6e3d'],
  beam: ['#E07A5F', '#3D405B', '#81B29A', '#F4D06F', '#D8A47F'],
  pixel: ['#FF6B6B', '#4ECDC4', '#45B7D1', '#96CEB4', '#FFEAA7'],
  sunset: ['#ff6b6b', '#ee5a24', '#f0932b', '#ffbe76', '#badc58'],
  ring: ['#6c5ce7', '#a29bfe', '#fd79a8', '#fdcb6e', '#e17055'],
  bauhaus: ['#ffe3b3', '#ff9a52', '#ff5252', '#c91e5a', '#3d2922'],
};

const avatarsRow = document.getElementById('avatars-row');
variantNames.forEach((variant, i) => {
  const item = document.createElement('div');
  item.className = 'avatar-item';
  const svg = generators[variant]('Clara Barton', variantColors[variant], SIZE);
  item.innerHTML = `<div class="avatar-bubble">${svg}</div><span class="avatar-label">${variantLabels[i]}</span>`;
  avatarsRow.appendChild(item);
});
</script>

</body>
</html>
